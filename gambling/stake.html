<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>nikehub mines</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url("https://fonts.googleapis.com/css2?family=Parkinsans:wght@600;700;800;900&display=swap");

:root {
--bg:#000000;
--text:#e8e8e8;
--gray-1:#c8c8c8;
--gray-2:#888888;
--gray-3:#444444;
--glass:rgba(18,18,18,0.88);
--border:rgba(255,255,255,0.09);
--input-bg:rgba(28,28,28,0.75);
--cell-bg:#161616;
--revealed:#0e0e0e;
--hover:#282828;
--mine:#383838;
--safe:#707070;
}

*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;height:100vh;background:var(--bg);color:var(--text);font-family:"Parkinsans",sans-serif;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;letter-spacing:0.5px}
header{text-align:center;margin:20px 0;width:90%;max-width:600px;opacity:0;animation:fadeIn 1s forwards 0.3s}
@keyframes fadeIn{to{opacity:1}}
h1{font-size:clamp(2.8rem,9vw,4.5rem);font-weight:900;letter-spacing:-1.8px;text-transform:uppercase;line-height:0.9;color:var(--text);text-shadow:0 0 15px rgba(255,255,255,0.1)}
#controls,#stats,#balance{margin:10px 0;font-size:1.15rem;color:var(--gray-1);font-weight:700}
#balance{font-size:1.5rem;font-weight:900}
input,select{background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:1rem;width:140px;margin:5px 8px;transition:0.2s}
input[type=range]{width:220px;accent-color:var(--gray-1)}
input:focus{border-color:rgba(255,255,255,0.25);outline:none}
#board{display:grid;gap:5px;background:var(--glass);backdrop-filter:blur(12px);padding:18px;border-radius:16px;border:1px solid var(--border);box-shadow:0 0 30px rgba(0,0,0,0.8);touch-action:manipulation;opacity:0;animation:fadeIn 1s forwards 0.6s}
.cell{width:54px;height:54px;background:var(--cell-bg);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.25s ease-out,background 0.2s,filter 0.2s;box-shadow:inset 0 1px 4px rgba(0,0,0,0.7)}
.cell:hover{transform:scale(1.08);filter:brightness(1.25)}
.revealed{cursor:default;animation:revealPop 0.5s ease-out}
@keyframes revealPop{0%{transform:scale(0.4);opacity:0}70%{transform:scale(1.15);opacity:1}100%{transform:scale(1)}}
.mine{background:var(--mine)!important}
.gem{background:var(--safe)!important;animation:gemPulse 1.6s infinite alternate}
@keyframes gemPulse{from{filter:brightness(1.2) drop-shadow(0 0 8px rgba(255,255,255,0.25))}to{filter:brightness(1.7) drop-shadow(0 0 18px rgba(255,255,255,0.5))}}
.flag{background:#606060!important}
img.icon{width:70%;height:70%;object-fit:contain;filter:brightness(1.4) drop-shadow(0 0 4px rgba(255,255,255,0.4));animation:spinIn 0.6s ease-out}
@keyframes spinIn{from{transform:scale(0.5) rotate(-180deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
button{margin:12px 10px;padding:12px 30px;font-size:1.2rem;font-weight:900;background:var(--gray-3);color:var(--text);border:none;border-radius:10px;cursor:pointer;transition:all 0.18s;text-transform:uppercase;letter-spacing:1px}
button:hover{background:var(--gray-2);transform:translateY(-2px)}
button:disabled{opacity:0.5;cursor:not-allowed}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;align-items:center;justify-content:center;opacity:0;transition:opacity 0.4s}
#modal.active{opacity:1}
#modal-content{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:35px;text-align:center;max-width:380px;backdrop-filter:blur(20px);animation:popIn 0.5s forwards}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
canvas#constellation-canvas{position:fixed;inset:0;z-index:-1;pointer-events:none}
</style>
</head>
<body>

<canvas id="constellation-canvas"></canvas>

<header>
<h1>nikegambling or sum</h1>
<div id="balance">balance: $<span id="balance-amount">1000.00</span></div>
<div id="controls">
mines: <input type="range" id="mines-slider" min="1" max="24" value="10" oninput="updateMines(this.value)">
<span id="mines-value">10</span><br>
bet: <input type="text" id="bet-amount" value="10.00" inputmode="decimal" pattern="[0-9]*\.?[0-9]{0,2}" placeholder="0.00">
<button onclick="updateBet()">update</button>
</div>
<div id="stats">
mines left: <span id="mines-left">10</span> • revealed: <span id="revealed">0</span><br>
multiplier: <span id="multiplier">1.00x</span> • payout: <span id="payout">10.00</span>
</div>
</header>

<div id="board"></div>

<div>
<button id="cashout" onclick="cashOut()" disabled>cash out</button>
<button onclick="newGame()">new game</button>
</div>

<div id="modal">
<div id="modal-content">
<h2>balance zero</h2>
<p>load funds or reset.</p>
<button onclick="closeModal()">ack</button>
</div>
</div>

<script>
let rows=5,cols=5,minesTotal=10,betAmount=10.00,balance=1000.00,board=[],revealedCount=0,flagsPlaced=0,gameOver=false,cashedOut=false;
const boardEl=document.getElementById("board"),minesLeftEl=document.getElementById("mines-left"),revealedEl=document.getElementById("revealed"),multiplierEl=document.getElementById("multiplier"),payoutEl=document.getElementById("payout"),cashoutBtn=document.getElementById("cashout"),betInput=document.getElementById("bet-amount"),minesValue=document.getElementById("mines-value"),balanceEl=document.getElementById("balance-amount"),modal=document.getElementById("modal");

function updateBalance(){
balanceEl.textContent=balance.toFixed(2);
if(balance<=0){
modal.style.display="flex";
setTimeout(()=>modal.classList.add("active"),10);
}
}

function closeModal(){
modal.classList.remove("active");
setTimeout(()=>modal.style.display="none",400);
}

function updateMines(val){
minesTotal=parseInt(val);
minesValue.textContent=val;
minesLeftEl.textContent=val;
if(!gameOver&&revealedCount===0)newGame();
}

function updateBet(){
let raw=betInput.value.replace(/[^0-9.]/g,'');
if(raw.split('.').length>2)raw=raw.replace(/\./g,(m,i)=>i?'':m);
let val=parseFloat(raw)||0.01;
val=Math.max(0.01,Math.min(val,balance));
betAmount=val;
betInput.value=val.toFixed(2);
updatePayout();
}

function updatePayout(){
if(revealedCount===0){
multiplierEl.textContent="1.00x";
payoutEl.textContent=betAmount.toFixed(2);
cashoutBtn.disabled=true;
return;
}
const total=rows*cols;
const safe=total-minesTotal;
let prob=1.0;
for(let i=0;i<revealedCount;i++){
prob*=(safe-i)/(total-i)||1e-10;
}
const fair=1/prob;
const mult=fair*0.97;
const rounded=Math.round(mult*100)/100;
multiplierEl.textContent=rounded.toFixed(2)+"x";
payoutEl.textContent=(betAmount*rounded).toFixed(2);
cashoutBtn.disabled=false;
}

function newGame(){
gameOver=cashedOut=false;
revealedCount=flagsPlaced=0;
minesLeftEl.textContent=minesTotal;
revealedEl.textContent=0;
multiplierEl.textContent="1.00x";
payoutEl.textContent=betAmount.toFixed(2);
cashoutBtn.disabled=true;
board=[];
boardEl.innerHTML="";
boardEl.style.gridTemplateColumns=`repeat(${cols},1fr)`;
for(let i=0;i<rows;i++){
board[i]=[];
for(let j=0;j<cols;j++){
board[i][j]={mine:false,revealed:false,flagged:false};
const cell=document.createElement("div");
cell.className="cell";
cell.dataset.row=i;
cell.dataset.col=j;
cell.addEventListener("click",handleClick);
cell.addEventListener("contextmenu",e=>{e.preventDefault();handleRightClick(e)});
boardEl.appendChild(cell);
}
}
placeMines();
}

function placeMines(){
let placed=0;
while(placed<minesTotal){
const r=Math.floor(Math.random()*rows);
const c=Math.floor(Math.random()*cols);
if(!board[r][c].mine){
board[r][c].mine=true;
placed++;
}
}
}

function handleClick(e){
e.preventDefault();
if(gameOver||cashedOut)return;
const cell=e.target.closest(".cell");
if(!cell)return;
const r=+cell.dataset.row,c=+cell.dataset.col;
const data=board[r][c];
if(data.flagged||data.revealed)return;
revealCell(r,c);
if(data.mine)gameLost();
else{
revealedEl.textContent=revealedCount;
updatePayout();
checkWin();
}
}

function handleRightClick(e){
e.preventDefault();
if(gameOver||cashedOut)return;
const cell=e.target.closest(".cell");
if(!cell)return;
const r=+cell.dataset.row,c=+cell.dataset.col;
const data=board[r][c];
if(data.revealed)return;
data.flagged=!data.flagged;
cell.classList.toggle("flag",data.flagged);
cell.innerHTML=data.flagged?"<img src='/flag.svg' class='icon'>":"";
flagsPlaced+=data.flagged?1:-1;
minesLeftEl.textContent=minesTotal-flagsPlaced;
}

function revealCell(r,c){
const data=board[r][c];
if(data.revealed||data.flagged)return;
data.revealed=true;
revealedCount++;
const cell=document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
cell.classList.add("revealed");
cell.innerHTML="";
if(data.mine){
cell.classList.add("mine");
const img=document.createElement("img");
img.src="/games/gambling/mine.svg";
img.className="icon";
cell.appendChild(img);
}else{
cell.classList.add("gem");
const img=document.createElement("img");
img.src="/games/gambling/diamond.svg";
img.className="icon";
cell.appendChild(img);
}
}

function gameLost(){
gameOver=true;
cashoutBtn.disabled=true;
balance-=betAmount;
updateBalance();
document.querySelectorAll(".cell").forEach(cell=>{
const r=+cell.dataset.row,c=+cell.dataset.col;
if(board[r][c].mine&&!cell.classList.contains("revealed"))revealCell(r,c);
});
}

function checkWin(){
if(revealedCount===rows*cols-minesTotal){
gameOver=true;
cashoutBtn.disabled=true;
const payout=parseFloat(payoutEl.textContent);
balance+=payout;
updateBalance();
}
}

function cashOut(){
if(gameOver||cashedOut||revealedCount===0)return;
cashedOut=true;
cashoutBtn.disabled=true;
const payout=parseFloat(payoutEl.textContent);
balance+=payout;
updateBalance();
}

updateBalance();
newGame();

const canvas=document.getElementById('constellation-canvas');
const ctx=canvas.getContext('2d');
let points=[];
const pointCount=45;
const maxDistance=120;

function initConstellation(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
points=Array.from({length:pointCount},()=> ({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.2,
vy:(Math.random()-0.5)*0.2,
radius:Math.random()*2.5+0.8
}));
}

function animateConstellation(){
ctx.clearRect(0,0,canvas.width,canvas.height);
points.forEach(p=>{
p.x+=p.vx;p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.9)";
ctx.fill();
points.forEach(q=>{
const dist=Math.hypot(p.x-q.x,p.y-q.y);
if(dist<maxDistance){
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(q.x,q.y);
ctx.strokeStyle=`rgba(255,255,255,${0.4*(1-dist/maxDistance)})`;
ctx.lineWidth=1.2;
ctx.stroke();
}
});
});
requestAnimationFrame(animateConstellation);
}

window.addEventListener('resize',initConstellation);
initConstellation();
animateConstellation();
</script>
</body>
</html>
