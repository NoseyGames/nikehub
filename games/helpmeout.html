    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passive Donate</title>
    
    <style>
      body {
        margin: 0;
        background-color: #0a0a0a;
        background-image: 
          linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
        background-size: 60px 60px;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #d1d1d1;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
      }

      .container {
        width: 100%;
        max-width: 450px;
        padding: 40px;
        border-radius: 16px;
        background: rgba(10, 10, 10, 0.9);
        border: 1px solid #222;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .status-dot {
        height: 8px;
        width: 8px;
        background-color: #00ff64;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        box-shadow: 0 0 10px #00ff64;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.3; }
        100% { opacity: 1; }
      }

      .status-text {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #666;
        margin-bottom: 20px;
        display: block;
      }

      #amount {
        font-size: 3.5rem;
        font-weight: 200;
        color: #fff;
        margin: 15px 0 5px 0;
        font-family: monospace;
      }

      /* Progress Bar Styles */
      .progress-container {
        width: 100%;
        height: 4px;
        background: #1a1a1a;
        border-radius: 10px;
        margin: 20px 0;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00ff64, #008f39);
        box-shadow: 0 0 10px rgba(0, 255, 100, 0.5);
        transition: width 0.5s ease;
      }

      .timer-label {
        color: #444;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      #timer {
        color: #888;
        font-size: 1.1rem;
        font-family: monospace;
        margin-bottom: 20px;
      }

      .info-text {
        margin-top: 20px;
        font-size: 0.85rem;
        color: #555;
        line-height: 1.6;
        border-top: 1px solid #222;
        padding-top: 20px;
      }

      .warning {
        margin-top: 10px;
        font-style: italic;
        color: #444;
      }
    </style>
</head>
<body>

  <div class="container">
    <span class="status-text"><span class="status-dot"></span> Session Live</span>
    
    <div id="amount">$0.00000</div>
    
    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
    
    <div class="timer-label">Session Duration</div>
    <div id="timer">00:00:00</div>

    <div class="info-text">
        Hey, this is a donate page. This runs ads.<br>
        Just sit here; we have nothing to do with the ads shown.
        <div class="warning">
            Fair warning: ads shown here could be inappropriate. We have no control over the content displayed. Thank you.
        </div>
    </div>
  </div>

  <script>
    let seconds = 0;
    const timerElem = document.getElementById('timer');
    setInterval(() => {
      seconds++;
      let h = Math.floor(seconds / 3600).toString().padStart(2, '0');
      let m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
      let s = (seconds % 60).toString().padStart(2, '0');
      timerElem.innerText = `${h}:${m}:${s}`;
    }, 1000);

    let total = 0.00000;
    const amountElem = document.getElementById('amount');
    const barElem = document.getElementById('bar');

    function slowUpdate() {
      let inc = (Math.random() * 0.000015) + 0.000005;
      total += inc;
      
      amountElem.innerText = `$${total.toFixed(5)}`;

      let progress = (total % 0.01) / 0.01 * 100;
      barElem.style.width = progress + "%";
      
      setTimeout(slowUpdate, Math.random() * 5000 + 5000);
    }

    slowUpdate();
  </script>

</body>
</html>
