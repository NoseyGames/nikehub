<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store - NikeHub Edition</title>
    <style>
        :root {
            --system-bg: #ffffff;
            --secondary-bg: #f2f2f7;
            --accent-blue: #007aff;
            --sidebar-bg: rgba(246, 246, 246, 0.8);
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --system-bg: #1c1c1e;
                --secondary-bg: #2c2c2e;
                --sidebar-bg: rgba(42, 42, 44, 0.8);
                --text-main: #ffffff;
                --text-secondary: #a1a1a6;
                --glass: rgba(28, 28, 30, 0.8);
                --border: rgba(255, 255, 255, 0.1);
            }
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--system-bg);
            color: var(--text-main);
            display: flex;
            overflow: hidden;
            user-select: none; /* Feels more like an app */
        }

        /* --- Sidebar --- */
        aside {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            gap: 2px;
        }

        .search-container {
            padding: 0 10px 20px 10px;
        }

        .search-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.05);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-main);
            outline: none;
            font-size: 13px;
        }

        @media (prefers-color-scheme: dark) {
            .search-bar { background: rgba(255, 255, 255, 0.1); }
        }

        .nav-item {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            transition: background 0.1s;
        }

        .nav-item:hover { background: rgba(0, 0, 0, 0.03); }
        .nav-item.active { background: rgba(0, 0, 0, 0.08); }

        @media (prefers-color-scheme: dark) {
            .nav-item:hover { background: rgba(255, 255, 255, 0.05); }
            .nav-item.active { background: rgba(255, 255, 255, 0.15); }
        }

        /* --- Content Area --- */
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 30px 40px 15px;
            border-bottom: 1px solid var(--border);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* --- Cards --- */
        .card {
            background: var(--secondary-bg);
            border-radius: 22px;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: scale(1.015); }
        .card:active { transform: scale(0.99); }

        .card-img-top {
            height: 240px;
            background-size: cover;
            background-position: center;
        }

        .app-list-card { padding: 24px; }

        .app-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 18px;
        }

        .app-icon {
            width: 54px;
            height: 54px;
            border-radius: 12px;
            object-fit: cover;
            background: #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .app-info { flex: 1; }
        .app-name { display: block; font-weight: 600; font-size: 15px; }
        .app-category { font-size: 13px; color: var(--text-secondary); }

        .get-btn {
            background: rgba(0, 122, 255, 0.12);
            color: var(--accent-blue);
            border: none;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .get-btn:hover { background: var(--accent-blue); color: white; }

        .label { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        h2 { margin: 8px 0 12px; font-size: 26px; letter-spacing: -0.5px; }
    </style>
</head>
<body>

    <aside>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search">
        </div>
        <div class="nav-item active" onclick="navTo('Discover')">Discover</div>
        <div class="nav-item" onclick="navTo('Arcade')">Arcade</div>
        <div class="nav-item" onclick="navTo('Create')">Create</div>
        <div class="nav-item" onclick="navTo('Work')">Work</div>
        <div class="nav-item" onclick="navTo('Play')">Play</div>
        <div class="nav-item" onclick="navTo('Develop')">Develop</div>
        <div class="nav-item" onclick="navTo('Categories')">Categories</div>
        <div class="nav-item" onclick="navTo('Updates')">Updates</div>
    </aside>

    <main>
        <header>
            <div class="header-left">
                <span id="current-date"></span>
                <h1 id="view-title">Discover</h1>
            </div>
        </header>

        <div class="container">
            <section class="card" style="grid-column: span 2;">
                <div class="card-img-top" style="background-image: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&q=80&w=1200');"></div>
                <div class="app-list-card">
                    <span class="label">Featured Game</span>
                    <h2>NikeHub Unblocked</h2>
                    <p style="color: var(--text-secondary); margin: 0; font-size: 15px;">Access hundreds of games instantly. No downloads, just play.</p>
                </div>
            </section>

            <section class="card app-list-card">
                <span class="label">Top Essentials</span>
                <h2>NikeHub Picks</h2>
                
                <div class="app-item">
                    <img class="app-icon" src="https://nikehub.org/favicon.png" alt="Icon">
                    <div class="app-info">
                        <span class="app-name">NikeHub Games</span>
                        <span class="app-category">Entertainment</span>
                    </div>
                    <button class="get-btn" onclick="launch('https://nikehub.org')">OPEN</button>
                </div>

                <div class="app-item">
                    <img class="app-icon" src="https://cdn.jsdelivr.net/gh/NoseyGames/data@main/discord.png" alt="Discord">
                    <div class="app-info">
                        <span class="app-name">NikeHub Discord</span>
                        <span class="app-category">Social</span>
                    </div>
                    <button class="get-btn" onclick="launch('https://discord.gg/Y4uMau4dGy')">JOIN</button>
                </div>

                <div class="app-item">
                    <div class="app-icon" style="background: #34c759; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px;">S</div>
                    <div class="app-info">
                        <span class="app-name">Support Site</span>
                        <span class="app-category">Help</span>
                    </div>
                    <button class="get-btn" onclick="launch('https://buymeacoffee.com/nikehub')">OPEN</button>
                </div>
            </section>


    <script>
        // Set dynamic date
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options);

        // Sidebar Navigation Logic
        function navTo(page) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText === page) item.classList.add('active');
            });
            document.getElementById('view-title').innerText = page;
            // You can add logic here to filter content or fetch new pages
        }

        // App Launching Logic
        function launch(url) {
            console.log("Launching: " + url);
            // If this is for your web macOS, you might change this to:
            // window.parent.openApp(url); 
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
