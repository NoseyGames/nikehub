<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filter Archive | Central Command</title>
    <style>
        :root {
            --accent-red: #ff4d4d; 
            --accent-glow: rgba(255, 77, 77, 0.25);
            --primary-bg: #0a0a0a;
            --card-bg: #141212;
            --card-border: #1e1e1e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius: 16px;
        }

        #battery-widget {
            display: block;
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px 18px;
            border-radius: 12px;
            z-index: 1000;
            font-family: 'JetBrains Mono', monospace;
            min-width: 140px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .battery-header { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .battery-meta { display: flex; align-items: baseline; gap: 8px; }
        #bat-percent { font-size: 1.4rem; font-weight: bold; color: var(--accent-red); }
        #bat-status { font-size: 0.65rem; color: var(--text-muted); }
        .bat-bar-container { width: 100%; height: 4px; background: #222; margin-top: 8px; border-radius: 2px; overflow: hidden; }
        #bat-bar { height: 100%; width: 0%; background: var(--accent-red); transition: width 0.5s ease-in-out; box-shadow: 0 0 8px var(--accent-glow); }



        body {
            font-family: system-ui, sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                linear-gradient(rgba(255, 77, 77, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 77, 77, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 999999;
            display: flex;
        }

        .cursor-path { fill: var(--accent-red); stroke: #000; stroke-width: 2px; }

        .wrapper { width: 90%; max-width: 1000px; text-align: center; }
        h1 { font-size: 2.5rem; color: var(--accent-red); text-shadow: 0 0 10px var(--accent-glow); margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); margin-bottom: 3rem; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 25px;
            border-radius: var(--radius);
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            text-align: left;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-red);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .card h2 { color: var(--accent-red); margin-bottom: 10px; font-size: 1.2rem; }
        .card p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="battery-widget">
        <div class="battery-header">System Power</div>
        <div class="battery-meta">
            <span id="bat-percent">--%</span>
            <span id="bat-status">Scanning...</span>
        </div>
        <div class="bat-bar-container">
            <div id="bat-bar"></div>
        </div>
    </div>

    <div class="wrapper">
        <h1>NikeHub Filter Archive</h1>
        <p class="subtitle">Select a template to view or edit.</p>

        <div class="container">
            <a href="/blockedpages/goguardian.html" class="card">
                <h2>GoGuardian</h2>
                <p></p>
            </a>

            <a href="/blockedpages/securly.html" class="card">
                <h2>Securly</h2>
                <p></p>
            </a>
            
            <a href="/blockedpages/linewize.html" class="card">
                <h2>Linewize</h2>
                <p></p>
            </a>

    <script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
        });

        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function updateAllBatteryInfo() {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('bat-percent').innerText = level + '%';
                    document.getElementById('bat-bar').style.width = level + '%';
                    document.getElementById('bat-status').innerText = battery.charging ? "Charging" : "Discharging";
                }
                updateAllBatteryInfo();
                battery.addEventListener('levelchange', updateAllBatteryInfo);
                battery.addEventListener('chargingchange', updateAllBatteryInfo);
            });
        }
    </script>
</body>
</html>
