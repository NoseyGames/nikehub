<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visual Studio Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.53.0/min/vs/loader.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height: 100vh;
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    #activity-bar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 48px;
      background: #191919;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 8px;
      gap: 20px;
      z-index: 10;
    }
    .activity-icon { width: 28px; height: 28px; opacity: 0.6; cursor: pointer; }
    .activity-icon:hover { opacity: 1; }
    #explorer-icon { background: url('https://raw.githubusercontent.com/microsoft/vscode-icons/main/icons/dark/files.svg') center/contain no-repeat; }
    #titlebar {
      height: 36px;
      background: #323233;
      display: flex;
      align-items: center;
      padding-left: 60px;
      user-select: none;
      border-bottom: 1px solid #2b2b2b;
    }
    #title { font-size: 12px; color: #cccccc; flex: 1; text-align: center; margin-right: 60px; }
    #app-container { display: flex; height: calc(100% - 60px); margin-left: 48px; }
    #sidebar {
      width: 240px;
      background: #252526;
      border-right: 1px solid #3c3c3c;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 10px 15px;
      font-size: 11px;
      font-weight: bold;
      color: #bbbbbb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-transform: uppercase;
    }
    .add-file-btn { cursor: pointer; font-size: 18px; color: #858585; }
    .add-file-btn:hover { color: #ffffff; }
    #file-list { flex: 1; overflow-y: auto; }
    .file {
      padding: 5px 15px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #cccccc;
    }
    .file:hover { background: #2a2d2e; }
    .file.active { background: #37373d; color: #ffffff; }
    .delete-btn { visibility: hidden; opacity: 0.5; font-size: 16px; margin-left: 8px; }
    .file:hover .delete-btn { visibility: visible; }
    .delete-btn:hover { opacity: 1; color: #ff5f57; }
    #editor-wrapper { flex: 1; display: flex; position: relative; }
    #monaco-container { flex: 1; height: 100%; }
    #preview-pane {
      flex: 1;
      background: white;
      border-left: 2px solid #3c3c3c;
      display: none;
    }
    #preview-iframe { width: 100%; height: 100%; border: none; }
    #statusbar {
      height: 24px;
      background: #007acc;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="activity-bar"><div class="activity-icon" id="explorer-icon"></div></div>
  <div id="titlebar"><div id="title">Visual Studio Code</div></div>
  <div id="app-container">
    <div id="sidebar">
      <div class="sidebar-header">Explorer<span class="add-file-btn" onclick="createNewFile()">+</span></div>
      <div id="file-list"></div>
    </div>
    <div id="editor-wrapper">
      <div id="monaco-container"></div>
      <div id="preview-pane"><iframe id="preview-iframe"></iframe></div>
    </div>
  </div>
  <div id="statusbar"><span id="lang-label">Plain Text</span><span style="margin-left: auto;">UTF-8</span></div>
  <script>
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.53.0/min/vs' } });
    const STORAGE_KEY = 'macos_vscode_state';
    const DISCORD_LINK = "https://discord.gg/Y4uMau4dGy";
    let files = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
      'index.html': { content: `\n`, lang: 'html' }
    };
    let currentFile = Object.keys(files)[0];
    let editor;
    let blobUrls = [];
    require(['vs/editor/editor.main'], function() {
      editor = monaco.editor.create(document.getElementById('monaco-container'), {
        value: files[currentFile].content,
        language: files[currentFile].lang,
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: false },
        fontSize: 13,
        fontFamily: 'Menlo, Monaco, "Courier New", monospace'
      });
      editor.onDidChangeModelContent(() => {
        files[currentFile].content = editor.getValue();
        save();
        if (currentFile.endsWith('.html')) updatePreview();
      });
      window.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 's') {
          e.preventDefault();
          save();
        }
      });
      renderFiles();
      updateUI();
    });
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(files)); }
    function renderFiles() {
      const list = document.getElementById('file-list');
      list.innerHTML = '';
      Object.keys(files).forEach(name => {
        const item = document.createElement('div');
        item.className = `file ${name === currentFile ? 'active' : ''}`;
        const label = document.createElement('span');
        label.textContent = name;
        label.onclick = () => switchFile(name);
        const del = document.createElement('span');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.onclick = (e) => { e.stopPropagation(); deleteFile(name); };
        item.appendChild(label);
        if (Object.keys(files).length > 1) item.appendChild(del);
        list.appendChild(item);
      });
    }
    function switchFile(name) {
      currentFile = name;
      editor.setValue(files[name].content);
      monaco.editor.setModelLanguage(editor.getModel(), files[name].lang);
      updateUI();
      renderFiles();
    }
    function updateUI() {
      document.getElementById('title').textContent = `Visual Studio Code — ${currentFile}`;
      document.getElementById('lang-label').textContent = files[currentFile].lang.toUpperCase();
      const isHTML = currentFile.endsWith('.html');
      document.getElementById('preview-pane').style.display = isHTML ? 'block' : 'none';
      if (isHTML) updatePreview();
    }
    function createNewFile() {
      const name = prompt("New Filename:");
      if (!name || files[name]) return;
      const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : 'txt';
      let content = `// ${DISCORD_LINK}\n`;
      if (ext === 'html') content = `\n`;
      if (ext === 'css')  content = `/* ${DISCORD_LINK} */\n`;
      const langMap = { 'js': 'javascript', 'html': 'html', 'css': 'css' };
      files[name] = { content, lang: langMap[ext] || 'plaintext' };
      save(); renderFiles(); switchFile(name);
      editor.focus();
    }
    function deleteFile(name) {
      if (confirm(`Delete ${name}?`)) {
        delete files[name];
        if (currentFile === name) currentFile = Object.keys(files)[0];
        save(); renderFiles(); switchFile(currentFile);
      }
    }
    function updatePreview() {
      blobUrls.forEach(url => URL.revokeObjectURL(url));
      blobUrls = [];
      let html = files[currentFile].content;
      const mimeTypes = { 'css': 'text/css', 'js': 'text/javascript', 'html': 'text/html' };
      Object.keys(files).forEach(filename => {
        if (filename === currentFile) return;
        const ext = filename.split('.').pop();
        const blob = new Blob([files[filename].content], { type: mimeTypes[ext] || 'text/plain' });
        const url = URL.createObjectURL(blob);
        blobUrls.push(url);
        const escapedFilename = filename.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(src|href)=["'](\\/?)${escapedFilename}["']`, 'g');
        html = html.replace(regex, `$1="${url}"`);
      });
      const iframe = document.getElementById('preview-iframe');
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
    }
  </script>
</body>
</html>
