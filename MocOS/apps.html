<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afterlife Apps</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
            text-align: center;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(255, 255, 255, 0.4),
                0 0 40px rgba(255, 255, 255, 0.2);
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            from {
                text-shadow: 
                    0 0 10px rgba(255, 255, 255, 0.8),
                    0 0 20px rgba(255, 255, 255, 0.6),
                    0 0 30px rgba(255, 255, 255, 0.4),
                    0 0 40px rgba(255, 255, 255, 0.2);
            }
            to {
                text-shadow: 
                    0 0 20px rgba(255, 255, 255, 1),
                    0 0 30px rgba(255, 255, 255, 0.8),
                    0 0 40px rgba(255, 255, 255, 0.6),
                    0 0 50px rgba(255, 255, 255, 0.4),
                    0 0 60px rgba(255, 255, 255, 0.2);
            }
        }

        .hack-button {
            position: relative;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            background: #333333;
            border: 2px solid #555555;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6);
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .hack-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .hack-button:hover {
            transform: translateY(-5px) scale(1.05);
            background: #444444;
            border-color: #ffffff;
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.3),
                0 0 60px rgba(255, 255, 255, 0.2),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            text-shadow: 
                0 0 15px rgba(255, 255, 255, 1),
                0 0 30px rgba(255, 255, 255, 0.8),
                0 0 45px rgba(255, 255, 255, 0.6);
        }

        .hack-button:hover::before {
            left: 100%;
        }

        .hack-button:active {
            transform: translateY(-2px) scale(0.98);
        }

        /* Floating white particles effect */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="particles">
        <div class="particle" style="left: 5%; animation-delay: 0s; animation-duration: 15s;"></div>
        <div class="particle" style="left: 10%; animation-delay: 2s; animation-duration: 18s;"></div>
        <div class="particle" style="left: 15%; animation-delay: 4s; animation-duration: 22s;"></div>
        <div class="particle" style="left: 20%; animation-delay: 1s; animation-duration: 17s;"></div>
        <div class="particle" style="left: 25%; animation-delay: 3s; animation-duration: 20s;"></div>
        <div class="particle" style="left: 30%; animation-delay: 5s; animation-duration: 16s;"></div>
        <div class="particle" style="left: 35%; animation-delay: 2.5s; animation-duration: 19s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 4.5s; animation-duration: 21s;"></div>
        <div class="particle" style="left: 45%; animation-delay: 1.5s; animation-duration: 18s;"></div>
        <div class="particle" style="left: 50%; animation-delay: 3.5s; animation-duration: 15s;"></div>
        <div class="particle" style="left: 55%; animation-delay: 0.5s; animation-duration: 23s;"></div>
        <div class="particle" style="left: 60%; animation-delay: 2.5s; animation-duration: 17s;"></div>
        <div class="particle" style="left: 65%; animation-delay: 4.5s; animation-duration: 20s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 1.5s; animation-duration: 16s;"></div>
        <div class="particle" style="left: 75%; animation-delay: 3.5s; animation-duration: 22s;"></div>
        <div class="particle" style="left: 80%; animation-delay: 5.5s; animation-duration: 19s;"></div>
        <div class="particle" style="left: 85%; animation-delay: 2s; animation-duration: 18s;"></div>
        <div class="particle" style="left: 90%; animation-delay: 4s; animation-duration: 21s;"></div>
        <div class="particle" style="left: 95%; animation-delay: 1s; animation-duration: 17s;"></div>
    </div>

    <h1>Afterlife Apps</h1>
    <a href="https://blooketisfunformath.b-cdn.net/" class="hack-button">Blooket Hacks</a>
</body>
</html>
